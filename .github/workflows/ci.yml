name: CI
# Read-only verification run after the approved five-task migration.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m compileall app tests migrations
      - run: python -m pytest -q
      - run: node apps-script/test/bridge.test.js

  staging-migration-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Read public staging health
        run: |
          curl --fail --silent --show-error --location \
            --retry 6 --retry-delay 10 --retry-all-errors \
            https://ai-os-core-staging.onrender.com/health > health.json
      - name: Verify safe staging preview state
        run: |
          python -c 'import json; d=json.load(open("health.json")); p=d.get("legacy_task_migration_preview",{}); print(json.dumps({"status":d.get("status"),"database":d.get("database"),"version":d.get("version"),"legacy_task_migration_preview":p}, sort_keys=True)); assert d.get("status")=="ok"; assert d.get("database")=="ok"; assert p.get("status") in {"not_run","success"}; assert p.get("status")!="success" or (p.get("received")==5 and p.get("importable",0)+p.get("skipped_existing",0)==5 and p.get("applied",0)+p.get("skipped_existing",0)==5)'
