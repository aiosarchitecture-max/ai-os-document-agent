services:
  - type: web
    name: ai-os-document-agent
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WEB_CONCURRENCY
        value: 1
      - key: REQUEST_TIMEOUT_SECONDS
        value: 60
