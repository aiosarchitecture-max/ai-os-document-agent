databases:
  - name: ai-os-core-db
    plan: basic-256mb
    databaseName: aios
    user: aios
    region: frankfurt
    ipAllowList: []

services:
  - type: web
    name: ai-os-document-agent
    env: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-os-core-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: WEB_CONCURRENCY
        value: 1
      - key: REQUEST_TIMEOUT_SECONDS
        value: 60

  - type: cron
    name: ai-os-cron-worker
    env: python
    region: frankfurt
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-os-core-db
          property: connectionString
      - key: ENVIRONMENT
        value: production

